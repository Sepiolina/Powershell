name: PowerShell Scripts CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./ -Recurse -Severity @('Error', 'Warning')
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }
          Write-Host "No issues found." -ForegroundColor Green

      - name: Check syntax (parse-only)
        shell: pwsh
        run: |
          Get-ChildItem -Path ./ -Recurse -Filter *.ps1 | ForEach-Object {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Error "Syntax error in $($_.FullName): $($errors | Out-String)"
            }
          }

  validate-encoding:
    name: Validate File Encoding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for non-UTF8 files
        run: |
          find . -name "*.ps1" | while read f; do
            if ! iconv -f utf-8 "$f" > /dev/null 2>&1; then
              echo "Bad encoding: $f"
              exit 1
            fi
          done

  validate-structure:
    name: Validate Script Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts have comment-based help
        run: |
          missing=()
          while IFS= read -r -d '' file; do
            if ! grep -qiE '\.SYNOPSIS|\.DESCRIPTION' "$file"; then
              missing+=("$file")
            fi
          done < <(find . -name "*.ps1" -not -path "./.git/*" -print0)

          if [ ${#missing[@]} -gt 0 ]; then
            echo "The following scripts are missing .SYNOPSIS or .DESCRIPTION:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi